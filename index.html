<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Noto Serif TC','Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:#272036;color:#ECE6DB;-webkit-font-smoothing:antialiased}
  #lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 80% at 75% 12%,#352a47 0%,#272036 55%,#1f1a2b 100%)}
  .card{width:100%;max-width:360px;text-align:center}
  .badge{width:58px;height:58px;border-radius:16px;margin:0 auto 26px;display:flex;align-items:center;justify-content:center;background:rgba(236,230,219,.07);border:1px solid rgba(236,230,219,.16)}
  .badge svg{width:26px;height:26px;stroke:#D9C7EC;fill:none;stroke-width:1.6}
  .kicker{font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:5px;color:#B6A7C9;font-weight:500;margin-bottom:14px}
  h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:46px;letter-spacing:2px;line-height:1.05;color:#F4EFE6}
  .sub{font-family:'Noto Serif TC',serif;font-size:18px;color:#C9BBA6;margin-top:10px;font-weight:700}
  .desc{font-family:'Noto Sans TC',sans-serif;font-size:13px;color:#8E84A0;margin:18px 0 26px;line-height:1.7}
  .field{display:flex;flex-direction:column;gap:11px}
  input{width:100%;height:50px;border-radius:13px;border:1px solid rgba(236,230,219,.18);background:rgba(255,255,255,.05);color:#F4EFE6;font-size:16px;text-align:center;letter-spacing:3px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s,background .15s}
  input::placeholder{letter-spacing:1px;color:#6f6680}
  input:focus{border-color:#B6A7C9;background:rgba(255,255,255,.08)}
  button{width:100%;height:50px;border:none;border-radius:13px;background:#C9A8E0;color:#2a2138;font-size:15px;font-weight:700;letter-spacing:4px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:filter .15s,opacity .15s}
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.6;cursor:default}
  #pwerr{opacity:0;transition:opacity .2s;color:#E59AA6;font-size:12.5px;font-family:'Noto Sans TC',sans-serif;margin-top:14px;letter-spacing:1px}
  .foot{margin-top:34px;font-family:'Noto Sans TC',sans-serif;font-size:11px;color:#5f566f;letter-spacing:2px}
  noscript .ns{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#C9BBA6}
</style>

<script>
document.addEventListener('DOMContentLoaded', function(){
  var lock = document.getElementById('lock');
  var input = document.getElementById('pw');
  var btn = document.getElementById('unlock');
  var errEl = document.getElementById('pwerr');
  var DELIM = '\u0000~~SECTION~~\u0000';
  var BLOB = JSON.parse(document.getElementById('encblob').textContent);
  function b2a(b64){ var bin=atob(b64); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
  async function decrypt(pw){
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b2a(BLOB.s), iterations:BLOB.it, hash:'SHA-256'}, baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
    var ptBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b2a(BLOB.iv)}, key, b2a(BLOB.ct));
    return new TextDecoder().decode(ptBuf);
  }
  async function runBundle(manifestText, extText, templateText){
    var manifest = JSON.parse(manifestText);
    var template = JSON.parse(templateText);
    var uuids = Object.keys(manifest);
    var blobUrls = {};
    await Promise.all(uuids.map(async function(uuid){
      var entry = manifest[uuid];
      try {
        var binaryStr = atob(entry.data);
        var bytes = new Uint8Array(binaryStr.length);
        for (var i=0;i<binaryStr.length;i++) bytes[i]=binaryStr.charCodeAt(i);
        var finalBytes = bytes;
        if (entry.compressed && typeof DecompressionStream!=='undefined'){
          var ds=new DecompressionStream('gzip');
          var writer=ds.writable.getWriter(); var reader=ds.readable.getReader();
          writer.write(bytes); writer.close();
          var chunks=[],total=0;
          while(true){ var r=await reader.read(); if(r.done)break; chunks.push(r.value); total+=r.value.length; }
          finalBytes=new Uint8Array(total); var off=0;
          for(var c=0;c<chunks.length;c++){ finalBytes.set(chunks[c],off); off+=chunks[c].length; }
        }
        blobUrls[uuid]=URL.createObjectURL(new Blob([finalBytes],{type:entry.mime}));
      } catch(err){ blobUrls[uuid]=URL.createObjectURL(new Blob([],{type:entry.mime})); }
    }));
    var extResources = extText ? JSON.parse(extText) : [];
    var resourceMap = {};
    for (var k=0;k<extResources.length;k++){ var en=extResources[k]; if(blobUrls[en.uuid]) resourceMap[en.id]=blobUrls[en.uuid]; }
    for (var u=0;u<uuids.length;u++){ template=template.split(uuids[u]).join(blobUrls[uuids[u]]); }
    template = template.replace(/\s+integrity="[^"]*"/gi,'').replace(/\s+crossorigin="[^"]*"/gi,'');
    var resourceScript = '<scr'+'ipt>window.__resources = ' + JSON.stringify(resourceMap).split('</'+'script>').join('<\\/'+'script>') + ';</scr'+'ipt>';
    var headOpen = template.match(/<head[^>]*>/i);
    if (headOpen){ var idx=headOpen.index+headOpen[0].length; template=template.slice(0,idx)+resourceScript+template.slice(idx); }
    var doc = new DOMParser().parseFromString(template,'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    var dead = Array.from(document.scripts);
    for (var d=0; d<dead.length; d++){
      var old=dead[d];
      var s=document.createElement('script');
      for (var a=0;a<old.attributes.length;a++){ s.setAttribute(old.attributes[a].name, old.attributes[a].value); }
      s.textContent=old.textContent;
      if ((s.type==='text/babel'||s.type==='text/jsx') && s.src){ var rr=await fetch(s.src); s.textContent=await rr.text(); s.removeAttribute('src'); }
      var p = s.src ? new Promise(function(res){ s.onload=s.onerror=res; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    if (window.Babel && typeof window.Babel.transformScriptTags==='function') window.Babel.transformScriptTags();
  }
  async function attempt(){
    var pw = input.value;
    if (!pw){ return; }
    btn.disabled = true; errEl.style.opacity='0'; btn.textContent='解鎖中…';
    try {
      var text = await decrypt(pw);
      var parts = text.split(DELIM);
      lock.style.transition='opacity .4s ease'; lock.style.opacity='0';
      await runBundle(parts[0], parts[1], parts[2]);
    } catch(err){
      btn.disabled=false; btn.textContent='解 鎖'; errEl.style.opacity='1';
      input.value=''; input.focus();
      input.animate([{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(7px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}],{duration:320});
    }
  }
  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
  input.focus();
});
</script>
